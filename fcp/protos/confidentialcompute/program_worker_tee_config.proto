syntax = "proto3";

package fcp.confidentialcompute;

option java_multiple_files = true;
option java_package = "com.google.intelligence.fcp.confidentialcompute";
option java_outer_classname = "ProgramWorkerTeeConfigProto";

// Initialization config for a program worker TEE container.
// Next ID: 2
message ProgramWorkerTeeInitializeConfig {
  // The number of calls that can be handled in parallel by the leaf executors.
  // Non-positive values indicate no maximum.
  int64 max_concurrent_computation_calls = 1;
}
