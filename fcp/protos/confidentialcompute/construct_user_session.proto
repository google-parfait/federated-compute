syntax = "proto3";

package fcp.confidentialcompute;

import "google/protobuf/timestamp.proto";

option java_package = "com.google.intelligence.fcp.confidentialcompute";
option java_multiple_files = true;
option java_outer_classname = "ConstructUserSessionProto";

// Configures the ConstructUserSession container upon initialization.
message ConstructUserSessionInitConfig {
  // `session_window_start` and `session_window_end` define the time window of
  // the user session.
  google.protobuf.Timestamp session_window_start = 1;
  google.protobuf.Timestamp session_window_end = 2;
  // The query prefix used to dynamically locate system tensors like
  // confidential_compute_event_time.
  string on_device_query_name = 3;
}

// Time-window related metadata for the constructed user session.
message SessionTimeWindowMetadata {
  // The start of the session time window. Inclusive.
  google.protobuf.Timestamp session_window_start = 1;

  // The end of the session time window. Exclusive.
  google.protobuf.Timestamp session_window_end = 2;
}
