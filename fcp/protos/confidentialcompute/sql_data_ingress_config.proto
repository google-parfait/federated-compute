syntax = "proto3";  // Our OSS build does not support editions.

package fcp.confidentialcompute;

import "fcp/protos/confidentialcompute/sql_query.proto";

option java_multiple_files = true;
option java_package = "com.google.intelligence.fcp.confidentialcompute";
option java_outer_classname = "SqlDataIngressConfigProto";

// Configures the SqlDataIngress container initialization.
message SqlDataIngressContainerInitializeConfiguration {
  // The SQL query to execute on the data.
  SqlQuery sql_query = 1;
}
